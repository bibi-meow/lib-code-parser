name: CI

on: [push, pull_request]

jobs:
  # LNG-01: MANDATORY platform x Python matrix. No continue-on-error -> all-green gates merges.
  # Each cell installs the lib (pulling the already-pinned libclang==18.1.1 from pyproject.toml
  # dev extra), imports it, runs the verified libclang smoke steps, then runs the full pytest
  # suite so the cpp track is exercised on every platform. The libclang wheel is self-contained
  # (manylinux/win/macos), so NO system-LLVM install step is required.
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # A2 (RESEARCH §CI note / Assumption A2): Linux aarch64 uses the native GitHub-hosted
        # arm64 runner label `ubuntu-24.04-arm`. If that native label is unavailable for this
        # repo, the documented fallback is QEMU emulation on `ubuntu-latest` via
        # `docker/setup-qemu-action@v3` running the libclang `manylinux2014_aarch64` wheel inside
        # a `quay.io/pypa/manylinux2014_aarch64` container. The native label is preferred (faster,
        # no emulation); confirmed at implementation time per A2.
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest]  # Linux x86_64 / Linux aarch64 / Windows x86_64
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true   # required while 3.14 is a pre-release
      - name: Install dependencies (pulls pinned libclang==18.1.1)
        run: pip install -e ".[dev]"
      - name: LNG-01 import
        run: python -c "import lib_code_parser; print('import OK', lib_code_parser.__version__)"
      - name: libclang smoke (a) dylib load + Index.create()
        run: |
          python -c "from clang.cindex import Index; idx = Index.create(); print('Index OK', idx)"
      - name: libclang smoke (b) library_path assertion
        run: |
          python -c "from clang.cindex import Config; lp = Config.library_path; print('library_path:', lp); assert lp, 'Config.library_path must be non-empty'"
      - name: libclang smoke (c) minimal C++ parse
        run: |
          python -c "
          from clang.cindex import Index
          idx = Index.create()
          tu = idx.parse('test.cpp', args=['-x', 'c++', '-std=c++17'], unsaved_files=[('test.cpp', 'int main() { return 0; }')])
          assert tu is not None
          cursors = list(tu.cursor.get_children())
          print(f'minimal C++ parse PASS - parsed {len(cursors)} top-level cursors')
          "
      - name: Run tests (full suite — exercises the cpp track)
        run: pytest --tb=short
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  # LNG-02: macOS arm64 best-effort. continue-on-error -> observed but NOT gating
  # (graduated from the Phase 1 sp3-libclang-spike seed job).
  macos-arm64-best-effort:
    name: macOS arm64 best-effort (py${{ matrix.python-version }})
    runs-on: macos-14
    continue-on-error: true   # D-22 / LNG-02: observed, never blocks the merge gate
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true   # required while 3.14 is a pre-release
      - name: Install with libclang pinned
        run: |
          pip install -e ".[dev]"
          pip show libclang
      - name: LNG-01 import
        run: python -c "import lib_code_parser; print('import OK', lib_code_parser.__version__)"
      - name: libclang smoke (a) dylib load + Index.create()
        run: |
          python -c "from clang.cindex import Index; idx = Index.create(); print('Index OK', idx)"
      - name: libclang smoke (b) library_path assertion
        run: |
          python -c "from clang.cindex import Config; lp = Config.library_path; print('library_path:', lp); assert lp, 'Config.library_path must be non-empty'"
      - name: libclang smoke (c) minimal C++ parse
        run: |
          python -c "
          from clang.cindex import Index
          idx = Index.create()
          tu = idx.parse('test.cpp', args=['-x', 'c++', '-std=c++17'], unsaved_files=[('test.cpp', 'int main() { return 0; }')])
          assert tu is not None
          cursors = list(tu.cursor.get_children())
          print(f'minimal C++ parse PASS - parsed {len(cursors)} top-level cursors')
          "
      - name: Run tests (full suite)
        run: pytest --tb=short
      - name: Record verdict
        if: always()
        run: |
          echo '--- macOS arm64 verdict (Python ${{ matrix.python-version }}) ---' >> $GITHUB_STEP_SUMMARY
